name: CI

on:
  push:
    branches: [main]
    # Docs-only pushes (the curriculum/resource lane lands one every few
    # minutes) skip the heavy build matrix — they cannot change build or test
    # outcomes, and each full 8-job run otherwise saturates the runner pool
    # for hours. The docs themselves are validated by docs-ci.yml on every
    # push. A commit touching BOTH code and docs still runs everything.
    paths-ignore:
      - 'docs/**'
      - 'artifacts/**'
      - 'bench-results/**'
      - '*.md'
      # The curriculum lane's commits touch python generators/validators and
      # the justfile alongside docs — none of which can change cargo
      # build/test outcomes, and docs-ci.yml runs the resource+link checks on
      # EVERY push regardless. Without these two lines each docs(math) commit
      # still launched the full ~3h 8-job matrix and saturated the runner
      # pool (measured 2026-07-03). A commit that ALSO touches any Rust/TOML
      # path still runs everything.
      - 'scripts/**'
      - 'justfile'
  pull_request:

# Pushes land every few minutes across two agent lanes and a run takes ~20
# minutes: with cancel-in-progress a newer push kills every run before it can
# report, so NO conclusion ever lands. Runners execute in parallel, so letting
# each push's run complete is fine now that the multi-hour test-job hang is
# fixed; the group only serializes runs for the same commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # z3-sys's build script downloads a prebuilt Z3 release via the GitHub API;
  # unauthenticated requests from shared runners get rate-limited (HTTP 403,
  # and a 3× retry cannot outwait it). The build script sends this token as a
  # Bearer header, lifting the request onto the authenticated quota.
  READ_ONLY_GITHUB_TOKEN: ${{ github.token }}

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (stable)
    runs-on: ubuntu-latest
    env:
      # ~175 test binaries + a from-source z3 (`--all-features`) overflow the
      # 14 GB runner disk with debuginfo on ("No space left on device", and
      # lld dying with SIGBUS mid-link). Tests don't need debuginfo in CI.
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - name: free runner disk (preinstalled toolsets we never use)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc                       /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The z3-gated differential fuzzes shell out to /usr/bin/z3.
      - name: install z3 binary
        run: sudo apt-get update -q && sudo apt-get install -y -q z3
      # z3-sys's gh-release download intermittently gets HTTP 403 (runner IP
      # rate limits); pre-build with backoff so a transient 403 doesn't fail
      # the whole matrix. The artifact is cached by rust-cache afterwards.
      - name: build (with download retry)
        run: |
          for i in 1 2 3; do
            cargo build --workspace --all-features --tests && exit 0
            echo "build attempt $i failed; backing off"; sleep 60
          done
          exit 1
      - run: cargo test --workspace --all-features

  cargo-mir-build:
    name: checked Cargo MIR build (nightly-2026-05-01)
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      AXEYUM_VERIFY_MIR_REQUIRE_CARGO_BUILD: 1
    steps:
      - uses: actions/checkout@v5
      # ADR-0287 binds this channel to rustc commit f53b654a8 and LLVM 22.1.4.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-05-01
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p axeyum-verify --test cargo_mir_build -- --nocapture

  reflection-semantics-gate:
    name: checked reflection semantics gate
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: python3 scripts/check-reflection-semantics-gate.py --run

  bench-micro:
    name: benchmark micro corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p axeyum-bench -- corpus/micro --backend sat-bv --timeout-ms 1000 --out /tmp/axeyum-bench-micro-sat-bv.json
      - run: cargo run -p axeyum-bench --features z3 -- corpus/micro --backend z3 --timeout-ms 1000 --out /tmp/axeyum-bench-micro-z3.json

  msrv:
    name: check (MSRV 1.88, default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      # The MSRV promise covers the default (pure Rust) build — the product
      # per ADR-0002. Optional native-oracle features track stable Rust.
      - run: cargo check --workspace

  wasm-qfbv:
    name: build and smoke-test (wasm32 QF_BV profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p axeyum-wasm --target wasm32-unknown-unknown
      - name: install matching wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.123 --locked
      - name: execute SAT and UNSAT smoke cases in Node WebAssembly
        run: |
          wasm-bindgen --target nodejs --out-dir target/wasm-smoke \
            target/wasm32-unknown-unknown/debug/axeyum_wasm.wasm
          AXEYUM_WASM_BUILD_PROFILE=debug \
            node scripts/measure-wasm-qfbv.cjs target/wasm-smoke/axeyum_wasm.js 1

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps

  lean-inductive-crosscheck:
    name: real Lean kernel + solver-proof cross-check
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      AXEYUM_REQUIRE_LEAN: 1
      AXEYUM_LEAN_BUDGET_SECS: 0
      AXEYUM_LEAN_JOBS: 2
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Axeyum emits standalone Lean modules and is not a Lake project.
      # lean-action requires lake-manifest.json even with every Lake step off,
      # so use the checksum-pinned elan installer and repository toolchain pin.
      - name: install pinned official Lean toolchain
        run: |
          lean_root="$RUNNER_TEMP/axeyum-lean"
          ./scripts/install-pinned-lean.sh "$lean_root"
          echo "ELAN_HOME=$lean_root/elan-home" >> "$GITHUB_ENV"
          echo "AXEYUM_LEAN_BIN=$lean_root/elan-home/bin/lean" >> "$GITHUB_ENV"
          echo "$lean_root/elan-home/bin" >> "$GITHUB_PATH"
      - run: lean --version
      - run: cargo test -p axeyum-lean-kernel --test real_lean_inductive_crosscheck -- --nocapture
      - run: cargo test -p axeyum-lean-kernel --test real_lean_nat_literal_crosscheck -- --nocapture
      - run: cargo test -p axeyum-lean-kernel --test real_lean_strict_positivity_crosscheck -- --nocapture
      # One module from every registered solver-proof family. The exhaustive
      # every-module sweep remains an explicit release/scheduled stress gate.
      # Resolve the installed binary explicitly so absence cannot become the
      # harness's optional local-development skip.
      - name: representative solver proofs in official Lean
        run: |
          test -x "$AXEYUM_LEAN_BIN"
          set -o pipefail
          cargo test -p axeyum-solver --features full --test lean_crosscheck \
            lean_crosscheck_representative -- --nocapture --exact 2>&1 \
            | tee "$RUNNER_TEMP/lean-representative.log"
          grep -Fx \
            'LEAN_CROSSCHECK|label=representative|families=71|modules=71|checked=71|budget_skipped=0|failed=0' \
            "$RUNNER_TEMP/lean-representative.log"

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  docs-links:
    name: docs resources and links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: ./scripts/check-foundational-resources.sh
      - run: python3 -m unittest scripts.tests.test_lean_u2_test_authority
      - run: python3 scripts/gen-lean-u2-test-authority.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_ci_profiles
      - run: python3 scripts/gen-lean-u2-official-ci-profiles.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_child_shards
      - run: python3 scripts/gen-lean-u2-official-child-shards.py --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_evidence
      - run: python3 scripts/gen-lean-execution-evidence.py --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_process
      - run: python3 scripts/lean_execution_process.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_store
      - run: python3 scripts/lean_execution_store.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_acceptance
      - run: python3 scripts/lean_execution_acceptance.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r2
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r3
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r3_result
      - run: python3 scripts/lean_u2_official_execution_r3_result.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2
      - run: python3 scripts/lean_u2_official_execution_m2.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_store
      - run: python3 scripts/lean_u2_official_execution_m2_store.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_run
      - run: python3 scripts/lean_u2_official_execution_m2_run.py offline-check
      - run: python3 scripts/lean_u2_official_execution_m2_r2.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r3
      - run: python3 scripts/lean_u2_official_execution_m2_r3.py offline-check
      - run: python3 scripts/lean_u2_official_execution_m2_r3.py validate-incomplete
      - run: python3 -m unittest scripts.tests.test_lean_complete_parity
      - run: python3 scripts/gen-lean-complete-parity.py --check
      - run: python3 -m unittest scripts.tests.test_lean_official_construct_matrix
      - run: python3 scripts/check-lean-official-construct-matrix.py --check
      - run: python3 scripts/freeze-lean-official-construct-matrix-stage-b.py --check
      - run: python3 scripts/freeze-lean-official-construct-matrix-product.py --check
      - run: python3 scripts/gen-smtlib-api-conformance.py --check
      - run: python3 scripts/gen-smtlib-session-contract.py --check
      - run: ./scripts/check-smtcomp-resume.sh
      - run: ./scripts/check-links.sh
