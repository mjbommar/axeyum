name: docs

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  docs:
    name: docs resources and links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Store evidence validates and reads its sealed implementation commit.
          fetch-depth: 0
      - run: ./scripts/check-foundational-resources.sh
      - run: python3 -m unittest scripts.tests.test_lean_u2_test_authority
      - run: python3 scripts/gen-lean-u2-test-authority.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_ci_profiles
      - run: python3 scripts/gen-lean-u2-official-ci-profiles.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_child_shards
      - run: python3 scripts/gen-lean-u2-official-child-shards.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_native_surface_classification
      - run: python3 scripts/gen-lean-u2-native-surface-classification.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_native_surface_content
      - run: python3 scripts/gen-lean-u2-native-surface-content.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_native_dependency
      - run: python3 scripts/gen-lean-u2-native-dependency.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_native_dependency_m2_1
      - run: python3 scripts/lean_u2_native_dependency_m2_1.py check-contract
      - run: python3 -m unittest scripts.tests.test_lean_execution_evidence
      - run: python3 scripts/gen-lean-execution-evidence.py --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_process
      - run: python3 scripts/lean_execution_process.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_store
      - run: python3 scripts/lean_execution_store.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_execution_acceptance
      - run: python3 scripts/lean_execution_acceptance.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r2
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r3
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_r3_result
      - run: python3 scripts/lean_u2_official_execution_r3_result.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2
      - run: python3 scripts/lean_u2_official_execution_m2.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_store
      - run: python3 scripts/lean_u2_official_execution_m2_store.py --check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_run
      - run: python3 scripts/lean_u2_official_execution_m2_run.py offline-check
      - run: python3 scripts/lean_u2_official_execution_m2_r2.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r3
      - run: python3 scripts/lean_u2_official_execution_m2_r3.py offline-check
      - run: python3 scripts/lean_u2_official_execution_m2_r3.py validate-incomplete
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r4
      - run: python3 scripts/lean_u2_official_execution_m2_r4.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r5
      - run: python3 scripts/lean_u2_official_execution_m2_r5.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r5_diagnostic
      - run: python3 scripts/lean_u2_official_execution_m2_r5_diagnostic.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r6
      - run: python3 scripts/lean_u2_official_execution_m2_r6.py offline-check
      - run: python3 -m unittest scripts.tests.test_lean_u2_official_execution_m2_r6_result
      - run: python3 scripts/lean_u2_official_execution_m2_r6_result.py result --check
      - run: python3 -m unittest scripts.tests.test_lean_complete_parity
      - run: python3 scripts/gen-lean-complete-parity.py --check
      - run: python3 -m unittest scripts.tests.test_lean_official_construct_matrix
      - run: python3 scripts/check-lean-official-construct-matrix.py --check
      - run: python3 scripts/freeze-lean-official-construct-matrix-stage-b.py --check
      - run: python3 scripts/freeze-lean-official-construct-matrix-product.py --check
      - run: ./scripts/check-smtcomp-resume.sh
      - run: ./scripts/check-links.sh
