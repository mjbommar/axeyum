# Formal Mathematics Tour — machine-readable knowledge graph.
#
# Authoritative node/edge list for the curriculum. Per-node prose lives in the
# sibling markdown files (path = "<area-folder>/<id>.md"); this file is the
# graph (prerequisites = edges) plus the axeyum decidability/testability
# metadata. See README.md.
#
# Invariants (validated by axeyum-scenarios::mathtour tests, which mirror this
# graph): every `prerequisites` id exists; the graph is acyclic; every
# `unlocks` is the inverse of some `prerequisites`.
#
# Field legend:
#   layer         0 foundations · 1 number systems · 2 structures · 3 destinations
#   decidability  decidable | computable | bounded | undecidable
#                   decidable  — a complete decision procedure (e.g. propositional)
#                   computable — answer is computed then checked (e.g. gcd)
#                   bounded    — only finite/fixed instances are decided
#                   undecidable— general case is Lean-horizon, not a benchmark
#   axeyum_theory the theory whose testable fragment this node maps to
#   family        the axeyum-scenarios Family that exercises it ("" = not yet)
#   status        covered | planned | lean-horizon

[meta]
title = "Formal Mathematics Tour"
description = "Backward-derived prerequisite DAG from calculus / number theory / linear algebra to foundations, with axeyum's testable fragment per node."
adr = "adr-0033-double-duty-educational-artifacts"
note = "docs/research/08-planning/formal-mathematics-tour.md"

