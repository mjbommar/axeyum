# cargo-deny configuration (current schema, cargo-deny 0.19.x).
# Run locally with: cargo deny check

[graph]
all-features = true

[advisories]
# Current defaults already deny vulnerabilities and unmaintained crates.
# Waive specific advisories by ID here, with a comment explaining why.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # Permissive licenses pulled in by the z3-static (prebuilt libz3) path.
    "bzip2-1.0.6",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path dependencies carry no version and are reported as wildcards by
# newer cargo-deny releases; they are not registry wildcards — allow them.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
